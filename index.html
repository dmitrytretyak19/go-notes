<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Go — Интерактивный Конспект (iOS 26)</title>
<style>
/* ─── IOS 26 Design System ─── */
:root {
  --sys-blue:    #007AFF;
  --sys-green:   #34C759;
  --sys-red:     #FF3B30;
  --sys-orange:  #FF9500;
  --sys-purple:  #AF52DE;
  --sys-gray:    #8E8E93;
  --sys-bg:      #F2F2F7;

  --glass-base:    rgba(255, 255, 255, 0.7);
  --glass-panel:   rgba(255, 255, 255, 0.45);
  --glass-card:    rgba(255, 255, 255, 0.75);
  --glass-code:    rgba(28, 28, 30, 0.9);
  
  --blur-heavy:    blur(40px) saturate(200%);
  --blur-medium:   blur(24px) saturate(180%);

  --border-glass:  rgba(255, 255, 255, 0.8);
  --border-soft:   rgba(0, 0, 0, 0.06);

  --shadow-float:  0 20px 40px rgba(0, 0, 0, 0.06), 0 1px 3px rgba(0,0,0,0.02);
  --shadow-card:   0 8px 24px rgba(0, 0, 0, 0.03), inset 0 1px 1px rgba(255, 255, 255, 1);
  --shadow-btn:    0 2px 8px rgba(0, 0, 0, 0.04);

  --text-primary:  #1D1D1F;
  --text-secondary:#86868B;
  --text-tertiary: #A1A1A6;

  --radius-xl:     28px;
  --radius-lg:     18px;
  --radius-md:     12px;
  --radius-sm:     8px;
  --radius-pill:   999px;

  --font-sans:     -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
  --font-mono:     "SF Mono", ui-monospace, "JetBrains Mono", monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background-color: #EBF0F5;
  color: var(--text-primary);
  font-family: var(--font-sans);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* Скрытие элементов вне режима редактирования */
body:not(.edit-mode) .require-edit { display: none !important; }

/* Fluid Animated Background Mesh */
.bg-mesh {
  position: fixed; inset: -50%; z-index: 0; pointer-events: none;
  background: 
    radial-gradient(circle at 15% 25%, rgba(0, 122, 255, 0.09) 0%, transparent 35%),
    radial-gradient(circle at 85% 15%, rgba(175, 82, 222, 0.08) 0%, transparent 40%),
    radial-gradient(circle at 50% 85%, rgba(52, 199, 89, 0.07) 0%, transparent 45%);
  animation: meshFlow 30s ease-in-out infinite alternate;
  filter: blur(50px);
}
@keyframes meshFlow {
  0% { transform: rotate(0deg) scale(1); }
  100% { transform: rotate(4deg) scale(1.05); }
}

/* Floating Dynamic Island Nav */
.nav-container {
  position: fixed; top: 16px; left: 0; right: 0; z-index: 300;
  display: flex; justify-content: center; padding: 0 16px; pointer-events: none;
}
.nav {
  pointer-events: auto; display: flex; flex-direction: column; gap: 10px;
  background: var(--glass-base); backdrop-filter: var(--blur-heavy); -webkit-backdrop-filter: var(--blur-heavy);
  border: 1px solid var(--border-glass); border-radius: var(--radius-xl);
  padding: 12px 18px; box-shadow: var(--shadow-float); width: 100%; max-width: 1050px;
}
.nav-top { display: flex; align-items: center; justify-content: space-between; }
.nav-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text-primary); font-weight: 700; font-size: 16px; }
.nav-logo-badge { background: var(--sys-blue); color: white; padding: 4px 8px; border-radius: 8px; font-size: 12px; }
.nav-logo span { color: var(--sys-blue); font-weight: 400; }

.nav-controls { display: flex; gap: 6px; align-items: center; }
.ctrl-btn {
  background: rgba(0,0,0,0.04); color: var(--text-secondary); border: none;
  padding: 6px 12px; border-radius: var(--radius-pill); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 4px;
}
.ctrl-btn:hover { background: rgba(0,0,0,0.08); color: var(--text-primary); }
.ctrl-btn.save { background: var(--sys-blue); color: white; font-weight: 600; box-shadow: 0 4px 12px rgba(0,122,255,0.25); }
.ctrl-btn.save:hover { background: #0066D6; }
.ctrl-btn.add-topic { background: rgba(52, 199, 89, 0.1); color: #248A3D; }
.ctrl-btn.add-topic:hover { background: rgba(52, 199, 89, 0.15); }

.nav-strip { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; -ms-overflow-style: none; }
.nav-strip::-webkit-scrollbar { display: none; }
.nav-btn {
  padding: 6px 14px; border-radius: var(--radius-pill); font-size: 13px; font-weight: 500;
  background: rgba(255,255,255,0.4); color: var(--text-primary); border: 1px solid var(--border-glass);
  cursor: pointer; white-space: nowrap; transition: all 0.2s; box-shadow: var(--shadow-btn);
}
.nav-btn:hover { background: rgba(255,255,255,0.7); }
.nav-btn.active { background: var(--text-primary); color: white; border-color: var(--text-primary); }

/* Main layout */
.main { position: relative; z-index: 10; padding: 155px 16px 80px; max-width: 1050px; margin: 0 auto; }

.header { text-align: center; margin-bottom: 32px; }
.header-label {
  display: inline-block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--sys-blue); background: rgba(0, 122, 255, 0.08); padding: 5px 12px; border-radius: var(--radius-pill); margin-bottom: 12px;
}
.header h1 { font-size: clamp(28px, 5vw, 40px); font-weight: 800; letter-spacing: -0.03em; margin-bottom: 6px; }
.header p { color: var(--text-secondary); font-size: 16px; margin-bottom: 20px; }

/* Dynamic Pills System */
.pills { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; }
.pill { padding: 6px 14px; border-radius: var(--radius-pill); font-size: 13px; font-weight: 500; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
.pill:hover { filter: brightness(0.95); transform: translateY(-1px); }
.pill-all { background: rgba(0,0,0,0.05); color: var(--text-primary); }
.pill.active-pill { box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-color: rgba(0,0,0,0.1); filter: brightness(0.9); }

.pill-c0 { background: rgba(52, 199, 89, 0.12); color: #248A3D; }
.pill-c1 { background: rgba(0, 122, 255, 0.12); color: var(--sys-blue); }
.pill-c2 { background: rgba(175, 82, 222, 0.12); color: var(--sys-purple); }
.pill-c3 { background: rgba(255, 149, 0, 0.12); color: #C27000; }
.pill-c4 { background: rgba(255, 59, 48, 0.12); color: var(--sys-red); }

/* Sections */
.section {
  background: var(--glass-panel); backdrop-filter: var(--blur-medium); -webkit-backdrop-filter: var(--blur-medium);
  border-radius: var(--radius-xl); border: 1px solid var(--border-glass); box-shadow: var(--shadow-card);
  margin-bottom: 20px; overflow: hidden; transition: box-shadow 0.3s;
}
.section:hover { box-shadow: var(--shadow-float); }
.section-header {
  padding: 14px 20px; display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none;
  background: rgba(255,255,255,0.25); border-bottom: 1px solid transparent;
}
.section:not(.collapsed) .section-header { border-bottom-color: var(--border-soft); }
.section-icon { font-size: 20px; outline: none; }
.section-num { font-size: 11px; font-weight: 700; color: var(--text-secondary); background: rgba(0,0,0,0.04); padding: 3px 8px; border-radius: 6px; outline: none; }
.section-title { font-size: 17px; font-weight: 600; flex: 1; letter-spacing: -0.01em; outline: none; }
.chevron { color: var(--text-tertiary); font-size: 14px; transition: transform 0.2s; }
.section.collapsed .chevron { transform: rotate(-90deg); }
.section-body { padding: 16px; background: rgba(255,255,255,0.05); }
.section.collapsed .section-body { display: none; }

/* COMPACT GRID & CARDS */
.grid { 
  display: grid; 
  /* ИЗМЕНЕНО: Сделал карточки компактнее: 260px вместо 310px, отступы меньше */
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
  gap: 12px; 
}
.card { background: var(--glass-card); border-radius: var(--radius-lg); border: 1px solid var(--border-glass); box-shadow: 0 4px 16px rgba(0,0,0,0.01); display: flex; flex-direction: column; position: relative; }
.card-header { padding: 10px 14px 8px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border-soft); }
.card-title { font-size: 13.5px; font-weight: 600; color: var(--sys-blue); flex: 1; outline: none; }
.card-body { padding: 10px 14px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
.desc { font-size: 12.5px; color: var(--text-secondary); line-height: 1.4; outline: none; }

[contenteditable="true"]:focus { outline: none; background: rgba(0,122,255,0.05); box-shadow: 0 0 0 2px rgba(0,122,255,0.2); border-radius: 6px; }
pre[contenteditable="true"]:focus {
  background: var(--glass-code) !important; box-shadow: 0 0 0 2px rgba(10, 132, 255, 0.6); color: #F5F5F7 !important;
}

/* COMPACT CODE BLOCKS */
.code-wrap { position: relative; border-radius: var(--radius-md); overflow: hidden; margin-top: 2px; }
pre { background: var(--glass-code); padding: 12px 14px; font-size: 11.5px; line-height: 1.45; font-family: var(--font-mono); color: #F5F5F7; overflow-x: auto; outline: none; white-space: pre-wrap; transition: background 0.2s, box-shadow 0.2s; }
.copy-btn { position: absolute; top: 6px; right: 6px; background: rgba(255,255,255,0.1); border: none; color: #E4E4E7; padding: 4px 8px; border-radius: 6px; font-size: 9.5px; font-weight: 500; cursor: pointer; backdrop-filter: blur(4px); transition: 0.2s; z-index: 2; }
.copy-btn:hover { background: rgba(255,255,255,0.25); color: #fff; }

/* COMPACT RULES */
.rule { padding: 8px 12px; border-radius: var(--radius-sm); font-size: 12px; line-height: 1.35; border-left: 3px solid var(--sys-blue); background: rgba(0,122,255,0.06); color: var(--text-primary); outline: none; }
.rule.warn { border-left-color: var(--sys-red); background: rgba(255,59,48,0.06); }
.rule.tip { border-left-color: var(--sys-orange); background: rgba(255,149,0,0.06); }
.rule.purple { border-left-color: var(--sys-purple); background: rgba(175,82,222,0.06); }

/* Utility Tools */
.del-btn { background: rgba(255,59,48,0.08); color: var(--sys-red); border: none; padding: 4px 10px; border-radius: var(--radius-sm); font-size: 11px; font-weight: 600; cursor: pointer; transition: 0.2s; }
.del-btn:hover { background: rgba(255,59,48,0.15); }

.add-card-container { display: flex; justify-content: center; margin-top: 12px; }
.btn-add-card { background: rgba(0,122,255,0.08); color: var(--sys-blue); border: 1px dashed rgba(0,122,255,0.3); padding: 8px 20px; border-radius: var(--radius-md); font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; width: 100%; text-align: center; }
.btn-add-card:hover { background: rgba(0,122,255,0.12); border-dashed-color: var(--sys-blue); }

.select-type { font-size: 11px; background: rgba(0,0,0,0.04); border: none; padding: 3px 6px; border-radius: 6px; color: var(--text-secondary); cursor: pointer; outline: none; }

/* Toast Window */
.toast { position: fixed; bottom: 30px; left: 50%; transform: translate(-50%, 80px) scale(0.9); background: rgba(28,28,30,0.9); backdrop-filter: blur(10px); color: white; padding: 12px 24px; border-radius: var(--radius-pill); font-size: 14px; font-weight: 500; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1); z-index: 9999; opacity: 0; pointer-events: none; }
.toast.show { transform: translate(-50%, 0) scale(1); opacity: 1; }

.footer { text-align: center; margin-top: 30px; padding: 24px; background: rgba(255,255,255,0.3); border-radius: var(--radius-xl); font-size: 13px; color: var(--text-secondary); border: 1px solid var(--border-glass); }

@media (max-width: 768px) { .main { padding-top: 145px; } }
</style>
</head>

let currentBlockFilter = 'all';
let isEditMode = false;

// ═══ EDIT MODE LOGIC ═══
function toggleEditMode() {
  isEditMode = !isEditMode;
  const btn = document.getElementById('edit-toggle-btn');
  
  if (isEditMode) {
    document.body.classList.add('edit-mode');
    btn.innerHTML = '👁️ Выйти из редактора';
    btn.style.background = 'rgba(255, 149, 0, 0.15)';
    btn.style.color = '#C27000';
    document.querySelector('.header p').innerText = 'Режим редактирования активен. Кликайте по тексту для изменения.';
    showToast('Режим редактирования включен');
  } else {
    document.body.classList.remove('edit-mode');
    btn.innerHTML = '✏️ Редактировать';
    btn.style.background = '';
    btn.style.color = '';
    document.querySelector('.header p').innerText = 'Режим просмотра. Нажмите «Редактировать» вверху для внесения изменений.';
    showToast('Режим чтения включен');
  }
  renderApp();
}

// ═══ CORE RENDERING ENGINE ═══
function renderApp() {
  renderPills();
  renderNavStrip();
  renderSections();
}

function renderPills() {
  const container = document.getElementById('pills-container');
  container.innerHTML = `<span class="pill pill-all ${currentBlockFilter === 'all' ? 'active-pill' : ''}" onclick="filterByBlock('all')">🗂️ Показать все</span>`;
  
  BLOCKS.forEach(b => {
    container.innerHTML += `<span class="pill ${b.colorClass} ${currentBlockFilter === b.id ? 'active-pill' : ''}" onclick="filterByBlock('${b.id}')">${b.label}</span>`;
  });
  
  container.innerHTML += `<span class="pill require-edit" style="background: rgba(0,0,0,0.06); color: var(--text-primary); font-weight: 600;" onclick="createNewBlock()">➕ Добавить блок</span>`;

  if (currentBlockFilter !== 'all') {
    container.innerHTML += `<span class="pill require-edit" style="background: rgba(255,59,48,0.1); color: var(--sys-red); font-weight: 600;" onclick="deleteCurrentBlock()">🗑️ Удалить этот блок</span>`;
  }
}

function renderNavStrip() {
  const container = document.getElementById('nav-strip-container');
  container.innerHTML = '';
  
  DATA.forEach(section => {
    if (currentBlockFilter !== 'all' && section.block !== currentBlockFilter) return;
    
    const btn = document.createElement('button');
    btn.className = `nav-btn ${(!section.collapsed) ? 'active' : ''}`;
    btn.innerHTML = `${section.icon} ${section.title || 'Новая тема'}`;
    btn.onclick = () => {
      section.collapsed = !section.collapsed;
      renderApp();
      const target = document.getElementById(section.id);
      if (target && !section.collapsed) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    };
    container.appendChild(btn);
  });
}

function renderSections() {
  const container = document.getElementById('sections-container');
  container.innerHTML = '';

  const blockOptionsHtml = BLOCKS.map(b => `<option value="${b.id}">${b.label}</option>`).join('');

  DATA.forEach((section, sIdx) => {
    if (currentBlockFilter !== 'all' && section.block !== currentBlockFilter) return;

    const secEl = document.createElement('div');
    secEl.className = `section ${section.collapsed ? 'collapsed' : ''}`;
    secEl.id = section.id;
    secEl.dataset.block = section.block;

    const headerEl = document.createElement('div');
    headerEl.className = 'section-header';
    headerEl.onclick = () => {
      section.collapsed = !section.collapsed;
      renderApp();
    };

    const currentBlock = BLOCKS.find(b => b.id === section.block);
    const blockBadgeHtml = !isEditMode && currentBlock 
      ? `<span class="pill ${currentBlock.colorClass}" style="font-size: 11px; padding: 3px 8px; font-weight: 600; pointer-events: none; white-space: nowrap;">${currentBlock.label.split(':')[0]}</span>` 
      : '';

    const currentSelectHtml = blockOptionsHtml.replace(`value="${section.block}"`, `value="${section.block}" selected`);
    const stopProp = isEditMode ? 'event.stopPropagation()' : '';

    headerEl.innerHTML = `
      <span class="section-icon" contenteditable="${isEditMode}" onclick="${stopProp}" oninput="updateState(${sIdx}, null, 'icon', this)">${section.icon}</span>
      <span class="section-num" contenteditable="${isEditMode}" onclick="${stopProp}" oninput="updateState(${sIdx}, null, 'num', this)">${section.num}</span>
      ${blockBadgeHtml}
      <span class="section-title" contenteditable="${isEditMode}" onclick="${stopProp}" oninput="updateState(${sIdx}, null, 'title', this)">${section.title}</span>
      <div class="require-edit" style="display:flex; align-items:center; gap:8px;" onclick="event.stopPropagation()">
        <select class="select-type" onchange="updateSectionBlock(${sIdx}, this.value)">
          ${currentSelectHtml}
        </select>
        <button class="del-btn" onclick="deleteSection(${sIdx})">🗑️</button>
      </div>
      <span class="chevron">▾</span>
    `;
    secEl.appendChild(headerEl);

    const bodyEl = document.createElement('div');
    bodyEl.className = 'section-body';

    const gridEl = document.createElement('div');
    gridEl.className = 'grid';

    section.cards.forEach((card, cIdx) => {
      const cardEl = document.createElement('div');
      cardEl.className = 'card';
      
      cardEl.innerHTML = `
        <div class="card-header">
          <div class="card-title" contenteditable="${isEditMode}" oninput="updateState(${sIdx}, ${cIdx}, 'title', this)">${card.title}</div>
          <select class="select-type require-edit" onchange="updateRuleType(${sIdx}, ${cIdx}, this.value)">
            <option value="normal" ${card.ruleType === 'normal' ? 'selected' : ''}>Инфо</option>
            <option value="tip" ${card.ruleType === 'tip' ? 'selected' : ''}>Лайфхак</option>
            <option value="warn" ${card.ruleType === 'warn' ? 'selected' : ''}>Внимание</option>
            <option value="purple" ${card.ruleType === 'purple' ? 'selected' : ''}>Заметка</option>
          </select>
          <button class="del-btn require-edit" style="padding: 2px 6px;" onclick="deleteCard(${sIdx}, ${cIdx})">🗑️</button>
        </div>
        <div class="card-body">
          <div class="desc" contenteditable="${isEditMode}" oninput="updateState(${sIdx}, ${cIdx}, 'desc', this)">${card.desc}</div>
          <div class="code-wrap">
            <pre contenteditable="${isEditMode}" oninput="updateState(${sIdx}, ${cIdx}, 'code', this)">${card.code}</pre>
            <button class="copy-btn" onclick="copyCodeText(this)">Copy</button>
          </div>
          <div class="rule ${card.ruleType || 'normal'}" contenteditable="${isEditMode}" oninput="updateState(${sIdx}, ${cIdx}, 'rule', this)">${card.rule}</div>
        </div>
      `;
      gridEl.appendChild(cardEl);
    });

    bodyEl.appendChild(gridEl);

    const actionWrap = document.createElement('div');
    actionWrap.className = 'add-card-container require-edit';
    actionWrap.innerHTML = `<button class="btn-add-card" onclick="createNewCard(${sIdx})">➕ Добавить карточку в этот блок</button>`;
    bodyEl.appendChild(actionWrap);

    secEl.appendChild(bodyEl);
    container.appendChild(secEl);
  });
}

// ═══ STATE MUTATIONS ═══
function updateState(sIdx, cIdx, field, element) {
  if (cIdx === null) {
    DATA[sIdx][field] = element.innerHTML;
  } else {
    DATA[sIdx].cards[cIdx][field] = element.innerHTML;
  }
}

function updateRuleType(sIdx, cIdx, value) {
  DATA[sIdx].cards[cIdx].ruleType = value;
  renderSections();
}

function updateSectionBlock(sIdx, value) {
  DATA[sIdx].block = value;
  renderApp();
}

function createNewSection() {
  const newId = `s${Date.now()}`;
  const blockToAssign = currentBlockFilter === 'all' ? (BLOCKS[0]?.id || '1') : currentBlockFilter;
  
  DATA.push({
    "id": newId, "icon": "📝", "num": "НОВАЯ", "title": "Название новой темы", "block": blockToAssign, "collapsed": false,
    "cards": [
      { "title": "Заголовок карточки", "desc": "Описание темы конспекта.", "code": "// Твой код", "rule": "Правило или совет.", "ruleType": "normal" }
    ]
  });
  
  renderApp();
  setTimeout(() => {
    const el = document.getElementById(newId);
    if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 50);
  showToast('Новая тема успешно добавлена!');
}

function createNewCard(sIdx) {
  DATA[sIdx].cards.push({
    "title": "Новое правило", "desc": "Описание структуры или синтаксиса.", "code": "// Напиши свой код сюда", "rule": "Дополнительная заметка к коду.", "ruleType": "normal"
  });
  renderSections();
  showToast('Карточка добавлена в конец темы.');
}

function createNewBlock() {
  const defaultName = `🔲 Блок ${BLOCKS.length + 1}: Новая тема`;
  const name = prompt("Введите название нового блока (вместе с эмодзи):", defaultName);
  
  if (!name || name.trim() === '') return;
  
  const newId = Date.now().toString();
  const colors = ['pill-c0', 'pill-c1', 'pill-c2', 'pill-c3', 'pill-c4'];
  const newColor = colors[BLOCKS.length % colors.length];
  
  BLOCKS.push({ id: newId, label: name, colorClass: newColor });
  
  filterByBlock(newId);
  showToast('Новый блок успешно создан!');
}

function deleteCurrentBlock() {
  if (currentBlockFilter === 'all') return;

  const blockToDelete = BLOCKS.find(b => b.id === currentBlockFilter);
  if (!blockToDelete) return;

  const confirmMsg = `ВНИМАНИЕ!\nВы уверены, что хотите удалить блок "${blockToDelete.label}"?\n\nВсе темы и карточки внутри этого блока также будут безвозвратно удалены!`;
  
  if (confirm(confirmMsg)) {
    const bIdx = BLOCKS.findIndex(b => b.id === currentBlockFilter);
    if (bIdx > -1) BLOCKS.splice(bIdx, 1);

    for (let i = DATA.length - 1; i >= 0; i--) {
      if (DATA[i].block === currentBlockFilter) {
        DATA.splice(i, 1);
      }
    }

    currentBlockFilter = 'all';
    document.getElementById('current-filter-label').innerText = 'Конспект · Все темы';
    renderApp();
    showToast('Блок и его содержимое удалены.');
  }
}

function deleteSection(sIdx) {
  if(confirm(`Удалить полностью тему "${DATA[sIdx].title}" со всеми карточками?`)) {
    DATA.splice(sIdx, 1);
    renderApp();
  }
}

function deleteCard(sIdx, cIdx) {
  if(confirm('Удалить эту карточку?')) {
    DATA[sIdx].cards.splice(cIdx, 1);
    renderSections();
  }
}

// ═══ TOP CONTROL BAR FUNCTIONS ═══
function expandAll() {
  DATA.forEach(s => s.collapsed = false);
  renderApp();
}

function collapseAll() {
  DATA.forEach(s => s.collapsed = true);
  renderApp();
}

// ═══ FILTER ═══
function filterByBlock(block) {
  currentBlockFilter = block;
  if (block === 'all') {
    document.getElementById('current-filter-label').innerText = 'Конспект · Все блоки';
  } else {
    const activeBlock = BLOCKS.find(b => b.id === block);
    document.getElementById('current-filter-label').innerText = activeBlock ? `Конспект · ${activeBlock.label}` : 'Конспект';
  }
  renderApp();
}

// ═══ COPIER ═══
function copyCodeText(btn) {
  const pre = btn.previousElementSibling;
  navigator.clipboard.writeText(pre.innerText).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

// ═══ TOAST NOTIFICATION ═══
function showToast(text) {
  const t = document.getElementById('toast_alert');
  t.innerText = text;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ═══ FILE EXPORTER ═══
function doExport() {
  let fullHtml = document.documentElement.outerHTML;
  
  const updatedDataJson = JSON.stringify(DATA, null, 2);
  const updatedBlocksJson = JSON.stringify(BLOCKS, null, 2);
  
  const dataRegex = /const\s+DATA\s*=\s*\[[\s\S]*?\];\s*\/\/\s*END_DATA/;
  const blocksRegex = /const\s+BLOCKS\s*=\s*\[[\s\S]*?\];\s*\/\/\s*END_BLOCKS/;
  
  if (dataRegex.test(fullHtml) && blocksRegex.test(fullHtml)) {
    fullHtml = fullHtml.replace(dataRegex, `const DATA = ${updatedDataJson}; // END_DATA`);
    fullHtml = fullHtml.replace(blocksRegex, `const BLOCKS = ${updatedBlocksJson}; // END_BLOCKS`);
  } else {
    alert("Критическая ошибка: Архитектурный маркер базы данных поврежден.");
    return;
  }
  
  try {
    const blob = new Blob(["<!DOCTYPE html>\n" + fullHtml], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'go_notes_ios26_glass.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Новый файл конспекта сохранён!');
  } catch (err) {
    alert('Ошибка работы дисковой подсистемы: ' + err.message);
  }
}

// Run Initial Render
renderApp();
</script>
